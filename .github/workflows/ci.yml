name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check tuneforge/ tests/ neurons/
      - run: ruff format --check tuneforge/ tests/ neurons/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_clap_scorer.py \
            --ignore=tests/test_audio_quality.py \
            -x

      - name: Run audio quality tests (requires librosa)
        run: |
          pip install librosa
          pytest tests/test_audio_quality.py -v --tb=short

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_clap_scorer.py \
            --cov=tuneforge --cov-report=xml \
            -x
        continue-on-error: true

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
        continue-on-error: true
