# TuneForge Minimum Compute Requirements

miner:
  gpu:
    required: true
    type: "NVIDIA"
    min_vram_gb: 16
    recommended: "RTX 4090 / A100"
  cpu:
    min_cores: 8
  ram:
    min_gb: 32
  disk:
    min_gb: 100
    type: "SSD"
  network:
    min_upload_mbps: 100
    min_download_mbps: 100

validator:
  gpu:
    required: false
    notes: "GPU optional but recommended for faster CLAP scoring"
  cpu:
    min_cores: 4
  ram:
    min_gb: 16
  disk:
    min_gb: 50
    type: "SSD"
  network:
    min_upload_mbps: 50
    min_download_mbps: 50
